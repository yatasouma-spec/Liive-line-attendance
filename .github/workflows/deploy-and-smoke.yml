name: Deploy And Smoke Check

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: liive-deploy-main
  cancel-in-progress: true

jobs:
  trigger-render:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy hook (optional)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set. Render auto deploy from GitHub is assumed."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered."

  smoke-check:
    name: Smoke Check Production
    runs-on: ubuntu-latest
    needs: trigger-render
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Wait for deployment boot
        run: sleep 90

      - name: Run smoke checks
        env:
          LIIVE_BASE_URL: ${{ vars.LIIVE_BASE_URL }}
          ADMIN_SMOKE_LOGIN_ID: ${{ secrets.ADMIN_SMOKE_LOGIN_ID }}
          ADMIN_SMOKE_PASSWORD: ${{ secrets.ADMIN_SMOKE_PASSWORD }}
        run: |
          BASE_URL="${LIIVE_BASE_URL:-https://liive-line-attendance.onrender.com}"
          node scripts/smoke-check.mjs "$BASE_URL"
